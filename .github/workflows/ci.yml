# ============================================================
# [Debugger/DevOps] CI/CD Pipeline
# ============================================================

name: MisinfoGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  CACHE_VERSION: v1

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting
        run: black --check model/ backend/
        continue-on-error: true

      - name: Lint with flake8
        run: flake8 model/ backend/ --max-line-length=100 --ignore=E203,W503

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ env.CACHE_VERSION }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ env.CACHE_VERSION }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchvision transformers datasets pillow opencv-python-headless networkx scikit-learn numpy pandas tqdm pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest model/tests/ -v --cov=model --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchvision transformers datasets pillow opencv-python-headless networkx scikit-learn numpy pandas tqdm httpx

      - name: Start API server
        run: |
          cd backend
          python -m pip install fastapi uvicorn
          python api.py &
          sleep 5
          curl -f http://localhost:8000/health || exit 1

      - name: Test health endpoint
        run: curl -f http://localhost:8000/health

      - name: Test model info
        run: curl -f http://localhost:8000/model/info

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v || echo "Integration tests pending"

      - name: Stop server
        run: kill %1 || true

  benchmark:
    name: Performance Benchmarks
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchvision transformers pillow numpy pandas tqdm

      - name: Run inference benchmark
        run: |
          python -c "
          import time, torch
          from model.fusion_classifier import FusionClassifier
          model = FusionClassifier()
          model.eval()
          with torch.no_grad():
              t = torch.randn(1, 64)
              i = torch.randn(1, 64)
              c = torch.randn(1, 8)
              p = torch.randn(1, 16)
              times = []
              for _ in range(50):
                  start = time.perf_counter()
                  model(t, i, c, p)
                  times.append((time.perf_counter() - start) * 1000)
          print(f'Mean: {sum(times)/len(times):.2f}ms, P95: {sorted(times)[47]:.2f}ms')
          assert sum(times)/len(times) < 100, 'Inference too slow'
          print('Benchmark passed')
          "
